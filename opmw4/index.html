<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPMW</title>
</head>

<body>
  <div id="root">
    <!-- Immediate CSS-only loading state -->
    <style>
      body { margin: 0; background: #0a0a0c; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
      .initial-loader { display: flex; flex-direction: column; align-items: center; gap: 20px; }
      .loader-bar { width: 140px; height: 2px; background: rgba(110, 231, 250, 0.05); position: relative; overflow: hidden; border-radius: 4px; }
      .loader-progress { position: absolute; left: -100%; width: 100%; height: 100%; background: #6ee7fa; animation: loading 1.8s cubic-bezier(0.65, 0, 0.35, 1) infinite; }
      @keyframes loading { from { left: -100%; } to { left: 100%; } }
    </style>
    <div class="initial-loader">
      <div class="loader-bar"><div class="loader-progress"></div></div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
